# 服务配置
server:
  env: "dev" # prod / test / dev
  host: "127.0.0.1"
  port: 7860
  name: "AgentChat" # 项目名称
  version: "2.5.0" # 服务版本号

# 数据库配置：MySQL (请根据实际配置更改 endpoint)
# 格式：mysql+pymysql://<user>:<password>@<host>:<port>/<database>
mysql:
  endpoint: "mysql+pymysql://root:123456@mysql:3306/agentchat" # 同步连接配置
  async_endpoint: "mysql+aiomysql://root:123456@mysql:3306/agentchat" # 异步连接配置

# 缓存配置：Redis
redis:
  endpoint: "redis://redis:6379" # Redis 连接地址（Docker 内请使用服务名）

# 多模型服务配置 (LLM、Embedding、Rerank)
multi_models:
  # 对话模型配置
  conversation_model:
    api_key: "sk-a8b3bad9803f490bbdb6e41f3fa1d5a8"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model_name: "qwen3.5-plus"
  # 工具调用/Function Call 模型配置
  tool_call_model:
    api_key: "sk-a8b3bad9803f490bbdb6e41f3fa1d5a8"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model_name: "qwen3.5-plus"
  # 复杂推理模型配置
  reasoning_model:
    api_key: "sk-a8b3bad9803f490bbdb6e41f3fa1d5a8"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model_name: "qwen3.5-plus"
  # 文生图模型配置
  text2image:
    api_key: "sk-a8b3bad9803f490bbdb6e41f3fa1d5a8"
    base_url: "https://dashscope.aliyuncs.com/api/v1"
    model_name: "qwen-image-2.0"
  # 多模态 (视觉) 模型配置
  qwen_vl:
    api_key: "sk-a8b3bad9803f490bbdb6e41f3fa1d5a8"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model_name: "qwen3-vl-plus"

  # Embedding 模型配置 (用于向量化)
  embedding:
    api_key: "sk-a8b3bad9803f490bbdb6e41f3fa1d5a8"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model_name: "text-embedding-v4"

  # Rerank 模型配置 (用于重排序召回结果)
  rerank:
    api_key: "sk-a8b3bad9803f490bbdb6e41f3fa1d5a8"
    base_url: "https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank"
    model_name: "gte-rerank-v2"


# 外部工具 (Tool) 配置
tools:
  # 高德地图天气 API 配置
  weather:
    api_key: "5972423faca1b91fea8c23b55aef46d0"
    endpoint: "https://restapi.amap.com/v3/weather/weatherInfo?parameters"
  # Tavily 联网搜索 API 配置 (注意配额限制)
  tavily:
    api_key: "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"
  # SerpApi 上的 Google Search API 配置
  google:
    api_key: "ba45f8fc7a6abe0730318a5601fad3e0d819b1138d39d23fac369d4e27f59c8e"
  # 阿里云快递查询 API 配置  
  # https://market.aliyun.com/detail/cmapi021863?spm=5176.29867242_210807074.0.0.44e83e7exsrQCd
  delivery:
    api_key: "cf351f58729443098c03d56bec8895a0"
    endpoint: "https://wuliu.market.alicloudapi.com/kdi"
  # BoCha 联网搜索 API 配置
  bocha:
    api_key: "sk-ea1c97d6c1324ce1a4e7dfbb81bc3c2c"
    endpoint: "https://api.bochaai.com/v1/web-search"

# RAG (检索增强生成) 配置
rag:
  enable_summary: False # 是否对知识库片段进行摘要
  enable_elasticsearch: False # 是否启用 Elasticsearch 进行关键词搜索
  enable_ik_analyzer: False # 是否启用 Elasticsearch 的IK分词器

  retrival:
    top_k: 5  # 知识库召回的最大数量
    min_score: 0.5 # 知识库召回结果的最小相似度分数阈值

  split:
    chunk_size: 500 # 知识库文档分块的最大字符数
    overlap_size: 100 # 文档分块之间的重叠字符数

  # ES数据库配置，主要做关键词召回
  elasticsearch:
    hosts: "http://127.0.0.1:9200" # Elasticsearch 连接地址。如果 'enable_elasticsearch' 为 False，则不需要填写。

  # 向量数据库配置 (Vector DB)
  vector_db:
    host: "milvus"
    port: "19530"
    mode: "standalone" # 向量库模式: standalone (Milvus), lite (轻量Milvus), chroma (ChromaDB)

# 阿里云对象存储 OSS 配置
storage:
  mode: "minio" # or oss

  oss:
    access_key_id: "LTAI5tL85xWWx9gb*******"
    access_key_secret: "MiKCkLCx9qZzxc*****"
    endpoint: "oss-cn-beijing.aliyuncs.com"
    bucket_name: "agentchat" # OSS 存储桶名称
    base_url: "https://agentchat.oss-cn-beijing.aliyuncs.com" # 访问基础 URL

  minio:
    access_key_id: "minioadmin"
    access_key_secret: "minioadmin"
    endpoint: "minio:9000"
    bucket_name: "agentchat" # minio 存储桶名称
    base_url: "http://127.0.0.1:9000/agentchat" # 访问基础 URL

